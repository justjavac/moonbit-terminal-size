name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            codecov_flag: linux
            coverage_file: coverage-linux.xml
          - os: macos-latest
            codecov_flag: macos
            coverage_file: coverage-macos.xml
          - os: windows-latest
            codecov_flag: windows
            coverage_file: coverage-windows.xml

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install MoonBit (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Install MoonBit (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force
          irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          "$HOME/.moon/bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Test
        shell: bash
        run: moon test --target native --enable-coverage

      - name: Coverage XML
        shell: bash
        run: moon coverage analyze -p justjavac/terminal_size -- -f cobertura -o "${{ matrix.coverage_file }}"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          disable_search: true
          fail_ci_if_error: true
          files: ${{ matrix.coverage_file }}
          flags: ${{ matrix.codecov_flag }}
          use_oidc: true
          verbose: true

  verify:
    name: Verify Generated Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install MoonBit
        shell: bash
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Verify formatting and generated files
        shell: bash
        run: |
          moon fmt --check
          moon check --deny-warn --target native
          moon info --target native
          git diff --exit-code

      - name: Build
        shell: bash
        run: moon build --target native
